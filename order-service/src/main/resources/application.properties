spring.application.name=order-service
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.sql.init.mode=always

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.contracts
spring.kafka.listener.missing-topics-fatal=false

app.kafka.retry.attempts=${APP_KAFKA_RETRY_ATTEMPTS:4}
app.kafka.retry.initial-delay-ms=${APP_KAFKA_RETRY_INITIAL_DELAY_MS:1000}
app.kafka.retry.multiplier=${APP_KAFKA_RETRY_MULTIPLIER:2.0}
